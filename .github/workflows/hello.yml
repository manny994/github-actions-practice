# Workdlow [No identation required for naming the workflow]
name: Hello

# On tells when the workflow should run (Give identation by tab)
on:
  workflow_dispatch: 
  
# Jobs tells what the workkflow should d, there can be one or more than one jobs, hence we write Jobs
# jobs is an object so needs identation

jobs:
  # 1st Job (give identation)
  say-hello:
    # Creates and Ephermal Container with Ubuntu running
    runs-on: ubuntu-latest
    # That epherman container will have steps to execute, hence name those steps and use run: run has the command
    steps:
      - name: Say hello to everyone
        run: echo "Hello Dosto"
